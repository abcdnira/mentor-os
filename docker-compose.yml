services:
  nginx:
    image: nginx:1.27-alpine
    container_name: mentor-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api

  web:
    build:
      context: ./apps/web
    container_name: mentor-web
    restart: always
    environment:
      - NODE_ENV=production

  api:
    build:
      context: ./apps/api
    container_name: mentor-api
    restart: always
    env_file:
      - .env

  postgres:
    image: ankane/pgvector:latest
    container_name: mentor-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - mentor_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7.4-alpine
    container_name: mentor-redis
    restart: always
    command: sh -c 'redis-server --requirepass "$$REDIS_PASSWORD"'
    env_file:
      - .env
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  mentor_postgres_data:
